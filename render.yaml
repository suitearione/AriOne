# =============================================================================
# Render Configuration - AriOne ERP
# =============================================================================
# Este arquivo configura automaticamente o deploy no Render

services:
  - type: web
    name: arione-erp
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: startCommand: FLASK_APP=app FLASK_ENV=production python -m flask db upgrade && gunicorn app:create_app() --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 5000

databases:
  - name: arione-db
    databaseName: arione
    user: arione
    region: oregon
    plan: free
