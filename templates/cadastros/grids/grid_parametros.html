<script>
const endpointsPar = {
    compras:     '{{ url_for("cadastros.card_parametros_compra") }}',
    vendas:      '{{ url_for("cadastros.card_parametros_venda") }}',
    producao:    '{{ url_for("cadastros.card_parametros_producao") }}',
    fiscal:      '{{ url_for("cadastros.card_parametros_fiscal") }}',
    financeiro:  '{{ url_for("cadastros.card_parametros_financeiro") }}',
    comercial:   '{{ url_for("cadastros.card_parametros_comercial") }}',
    produtos:    '{{ url_for("cadastros.card_parametros_produto") }}',
    branding:    '{{ url_for("cadastros.form_branding") }}',
    status:      '{{ url_for("cadastros.card_status_workflow") }}'
};

function abrirModalPar(tipo) {
    const url = endpointsPar[tipo];
    if (url) window.location.href = url;
}

{% if is_ari_dev %}
function updateGridSealsPar() {
    const getSafeId = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "_");
    
    const mappings = {
        'card-par-compras':     { sub: "CADASTROS — Parâmetros", tela: "Compras" },
        'card-par-vendas':      { sub: "CADASTROS — Parâmetros", tela: "Vendas" },
        'card-par-producao':    { sub: "CADASTROS — Parâmetros", tela: "Produção" },
        'card-par-fiscal':      { sub: "CADASTROS — Parâmetros", tela: "Fiscal" },
        'card-par-financeiro':  { sub: "CADASTROS — Parâmetros", tela: "Financeiro" },
        'card-par-comercial':   { sub: "CADASTROS — Parâmetros", tela: "Comercial" },
        'card-par-produtos':    { sub: "CADASTROS — Parâmetros", tela: "Produtos" },
        'card-par-branding':    { sub: "CADASTROS — Parâmetros", tela: "Identidade Visual" },
        'card-par-status':      { sub: "CADASTROS — Parâmetros", tela: "Status / Workflow" }
    };

    Object.entries(mappings).forEach(([cardId, info]) => {
        const sId = getSafeId(info.sub + "_" + info.tela);
        const isPronto = localStorage.getItem('arione_dev_p2_' + sId) === 'true';
        const card = document.getElementById(cardId);
        
        if (card) {
            let badge = card.querySelector('.ge-card-done-badge');
            if (isPronto) {
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'ge-card-done-badge';
                    badge.innerHTML = '<i class="fas fa-award"></i>';
                    badge.title = "AriOne Golden Standard";
                    card.appendChild(badge);
                    card.style.borderColor = "#FFD700";
                }
            } else if (badge) {
                badge.remove();
                card.style.borderColor = "";
            }
        }
    });
}

document.addEventListener('DOMContentLoaded', () => {
    updateGridSealsPar();
    setInterval(updateGridSealsPar, 2000);
});
{% endif %}
</script>
