<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ captura.nome }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h1 {
            font-size: 22px;
            color: #1e293b;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .form-header p {
            font-size: 13px;
            color: #64748b;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #7A255F;
            box-shadow: 0 0 0 3px rgba(122, 37, 95, 0.1);
        }
        .form-group input::placeholder {
            color: #94a3b8;
        }
        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7A255F, #9b3a7a);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-enviar:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(122, 37, 95, 0.3);
        }
        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #94a3b8;
        }
        /* Sucesso */
        .sucesso {
            text-align: center;
            padding: 40px 20px;
        }
        .sucesso i {
            font-size: 48px;
            color: #25D366;
            margin-bottom: 16px;
        }
        .sucesso h2 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .sucesso p {
            font-size: 14px;
            color: #64748b;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="form-card">
        {% if sucesso %}
        <div class="sucesso">
            <i class="fas fa-check-circle"></i>
            <h2>Enviado!</h2>
            <p>{{ captura.mensagem_sucesso or 'Obrigado! Entraremos em contato em breve.' }}</p>
        </div>
        {% else %}
        <div class="form-header">
            <h1>{{ captura.nome }}</h1>
            <p>Preencha seus dados para entrarmos em contato</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <label>Nome *</label>
                <input type="text" name="nome" required placeholder="Seu nome completo">
            </div>
            <div class="form-group">
                <label>Telefone (WhatsApp) *</label>
                <input type="tel" name="telefone" required placeholder="(85) 99999-9999">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="seu@email.com">
            </div>
            <button type="submit" class="btn-enviar">
                <i class="fab fa-whatsapp"></i> Quero ser Atendido
            </button>
        </form>
        <div class="form-footer">
            Powered by AriOne
        </div>
        {% endif %}
    </div>
</body>
</html>
