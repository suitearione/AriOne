<!-- templates/digital/grids/grid_chatone.html -->
<div id="modal-overlay-cht" class="ge-modal-overlay" onclick="fecharModalCht()">
    <div class="ge-modal" onclick="event.stopPropagation()">
        <div class="ge-modal-header">
            <div class="ge-modal-title"><i id="modal-icon-cht" class="ge-modal-icon"></i><span id="modal-titulo-cht">ChatOne</span></div>
            <button class="ge-modal-fechar" onclick="fecharModalCht()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ge-modal-body" id="modal-body-cht"></div>
    </div>
</div>

<div class="ge-grid-wrapper">
    <div class="ge-section-title"><i class="fas fa-comments"></i><span>ChatOne</span></div>
    <div class="ge-cards-container">

        <div class="ge-card" onclick="abrirModalCht('atendimentos')" style="--card-cor:#25D366;--card-cor-bg:rgba(37,211,102,0.10);">
            <i class="fab fa-whatsapp ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fab fa-whatsapp ge-card-icon"></i></div>
            <span class="ge-card-label">Atendimentos</span><span class="ge-card-desc">Chats e conversas</span>
        </div>

        <div class="ge-card" onclick="abrirModalCht('canais')" style="--card-cor:#0072CE;--card-cor-bg:rgba(0,114,206,0.10);">
            <i class="fas fa-broadcast-tower ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-broadcast-tower ge-card-icon"></i></div>
            <span class="ge-card-label">Canais</span><span class="ge-card-desc">WhatsApp, chat, e-mail</span>
        </div>

        <div class="ge-card" onclick="abrirModalCht('chatbot')" style="--card-cor:#7A255F;--card-cor-bg:rgba(122,37,95,0.10);">
            <i class="fas fa-robot ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-robot ge-card-icon"></i></div>
            <span class="ge-card-label">Chatbot</span><span class="ge-card-desc">Respostas automáticas</span>
        </div>

        <div class="ge-card" onclick="abrirModalCht('disparos')" style="--card-cor:#E67E22;--card-cor-bg:rgba(230,126,34,0.10);">
            <i class="fas fa-paper-plane ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-paper-plane ge-card-icon"></i></div>
            <span class="ge-card-label">Disparos</span><span class="ge-card-desc">Mensagens em massa</span>
        </div>


    </div>
</div>

<script>
const modaisCht = {
    atendimentos:{titulo:'Atendimentos', icone:'fab fa-whatsapp',        campos:[['Cliente *','cliente','text'],['Canal','canal','text'],['Status','status','text'],['Atendente','atend','text']]},
    canais:      {titulo:'Canais',       icone:'fas fa-broadcast-tower', campos:[['Nome *','nome','text'],['Tipo','tipo','text'],['Token/Número','token','text'],['Status','status','text']]},
    chatbot:     {titulo:'Chatbot',      icone:'fas fa-robot',           campos:[['Gatilho *','gatilho','text'],['Resposta *','resposta','text'],['Próxima Ação','acao','text']]},
    disparos:    {titulo:'Disparos',     icone:'fas fa-paper-plane',     campos:[['Nome da Campanha *','nome','text'],['Canal','canal','text'],['Mensagem','msg','text'],['Data Envio','data','date']]},
};

function abrirModalCht(tipo) {
    const m = modaisCht[tipo]; if (!m) return;
    const campos = m.campos.map(([label,name,type]) => `<div class="ge-form-group"><label>${label}</label><input type="${type}" name="${name}" placeholder="${label.replace(' *','')}"></div>`).join('');
    document.getElementById('modal-titulo-cht').textContent = m.titulo;
    document.getElementById('modal-icon-cht').className = m.icone + ' ge-modal-icon';
    document.getElementById('modal-body-cht').innerHTML = `<form class="ge-form" method="POST" action="#">${campos}<div class="ge-form-actions"><button type="button" class="ge-btn-cancelar" onclick="fecharModalCht()">Cancelar</button><button type="submit" class="ge-btn-salvar">💾 Salvar</button></div></form>`;
    document.getElementById('modal-overlay-cht').classList.add('ativo');
    document.body.style.overflow = 'hidden';
}
function fecharModalCht() { document.getElementById('modal-overlay-cht').classList.remove('ativo'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key==='Escape') fecharModalCht(); });
</script>
