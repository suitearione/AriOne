<!-- templates/digital/cards/grid_metricsone.html -->
<div id="modal-overlay-mtr" class="ge-modal-overlay" onclick="fecharModalMtr()">
    <div class="ge-modal" onclick="event.stopPropagation()">
        <div class="ge-modal-header">
            <div class="ge-modal-title"><i id="modal-icon-mtr" class="ge-modal-icon"></i><span id="modal-titulo-mtr">MetricsOne</span></div>
            <button class="ge-modal-fechar" onclick="fecharModalMtr()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ge-modal-body" id="modal-body-mtr"></div>
    </div>
</div>

<div class="ge-grid-wrapper">
    <div class="ge-section-title"><i class="fas fa-chart-pie"></i><span>MetricsOne</span></div>
    <div class="ge-cards-container">

        <div class="ge-card" onclick="abrirModalMtr('redes_sociais')" style="--card-cor:#E67E22;--card-cor-bg:rgba(230,126,34,0.10);">
            <i class="fas fa-share-alt ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-share-alt ge-card-icon"></i></div>
            <span class="ge-card-label">Redes Sociais</span><span class="ge-card-desc">Alcance e engajamento</span>
        </div>

        <div class="ge-card" onclick="abrirModalMtr('campanhas')" style="--card-cor:#0072CE;--card-cor-bg:rgba(0,114,206,0.10);">
            <i class="fas fa-bullseye ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-bullseye ge-card-icon"></i></div>
            <span class="ge-card-label">Campanhas</span><span class="ge-card-desc">ROI e conversões</span>
        </div>

        <div class="ge-card" onclick="abrirModalMtr('trafego')" style="--card-cor:#27AE60;--card-cor-bg:rgba(39,174,96,0.10);">
            <i class="fas fa-chart-area ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-chart-area ge-card-icon"></i></div>
            <span class="ge-card-label">Tráfego</span><span class="ge-card-desc">Visitas e fontes</span>
        </div>

        <div class="ge-card" onclick="abrirModalMtr('pixel')" style="--card-cor:#8E44AD;--card-cor-bg:rgba(142,68,173,0.10);">
            <i class="fas fa-crosshairs ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-crosshairs ge-card-icon"></i></div>
            <span class="ge-card-label">Pixel</span><span class="ge-card-desc">Rastreamento de eventos</span>
        </div>


    </div>
</div>

<script>
const modaisMtr = {
    redes_sociais:{titulo:'Redes Sociais', icone:'fas fa-share-alt',  campos:[['Rede *','rede','text'],['Período','periodo','text'],['Métrica','metrica','text']]},
    campanhas:    {titulo:'Campanhas',     icone:'fas fa-bullseye',   campos:[['Campanha *','camp','text'],['Período','periodo','text'],['Investimento (R$)','invest','number']]},
    trafego:      {titulo:'Tráfego',       icone:'fas fa-chart-area', campos:[['Período *','periodo','text'],['Fonte','fonte','text'],['Página','pagina','text']]},
    pixel:        {titulo:'Pixel',         icone:'fas fa-crosshairs', campos:[['Nome *','nome','text'],['Plataforma','plat','text'],['ID do Pixel','pid','text'],['Evento','evento','text']]},
};

function abrirModalMtr(tipo) {
    const m = modaisMtr[tipo]; if (!m) return;
    const campos = m.campos.map(([label,name,type]) => `<div class="ge-form-group"><label>${label}</label><input type="${type}" name="${name}" placeholder="${label.replace(' *','')}"></div>`).join('');
    document.getElementById('modal-titulo-mtr').textContent = m.titulo;
    document.getElementById('modal-icon-mtr').className = m.icone + ' ge-modal-icon';
    document.getElementById('modal-body-mtr').innerHTML = `<form class="ge-form" method="POST" action="#">${campos}<div class="ge-form-actions"><button type="button" class="ge-btn-cancelar" onclick="fecharModalMtr()">Cancelar</button><button type="submit" class="ge-btn-salvar">💾 Salvar</button></div></form>`;
    document.getElementById('modal-overlay-mtr').classList.add('ativo');
    document.body.style.overflow = 'hidden';
}
function fecharModalMtr() { document.getElementById('modal-overlay-mtr').classList.remove('ativo'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key==='Escape') fecharModalMtr(); });
</script>
