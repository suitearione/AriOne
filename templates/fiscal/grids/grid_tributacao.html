<!-- templates/fiscal/grids/grid_tributacao.html -->
<div id="modal-overlay-trb" class="ge-modal-overlay" onclick="fecharModalTrb()">
    <div class="ge-modal" onclick="event.stopPropagation()">
        <div class="ge-modal-header">
            <div class="ge-modal-title"><i id="modal-icon-trb" class="ge-modal-icon"></i><span id="modal-titulo-trb">Formulário</span></div>
            <button class="ge-modal-fechar" onclick="fecharModalTrb()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ge-modal-body" id="modal-body-trb"></div>
    </div>
</div>

<div class="ge-grid-wrapper">
    <div class="ge-section-title"><i class="fas fa-percent"></i><span>Tributação</span></div>
    <div class="ge-cards-container">

        <div class="ge-card" onclick="abrirModalTrb('icms')" style="--card-cor:#C0392B;--card-cor-bg:rgba(192,57,43,0.10);">
            <i class="fas fa-percentage ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-percentage ge-card-icon"></i></div>
            <span class="ge-card-label">ICMS</span><span class="ge-card-desc">Alíquotas de ICMS</span>
        </div>

        <div class="ge-card" onclick="abrirModalTrb('ipi')" style="--card-cor:#E67E22;--card-cor-bg:rgba(230,126,34,0.10);">
            <i class="fas fa-industry ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-industry ge-card-icon"></i></div>
            <span class="ge-card-label">IPI</span><span class="ge-card-desc">Imposto sobre produtos</span>
        </div>

        <div class="ge-card" onclick="abrirModalTrb('pis_cofins')" style="--card-cor:#2980B9;--card-cor-bg:rgba(41,128,185,0.10);">
            <i class="fas fa-file-invoice-dollar ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-file-invoice-dollar ge-card-icon"></i></div>
            <span class="ge-card-label">PIS / COFINS</span><span class="ge-card-desc">Contribuições federais</span>
        </div>

        <div class="ge-card" onclick="abrirModalTrb('iss')" style="--card-cor:#27AE60;--card-cor-bg:rgba(39,174,96,0.10);">
            <i class="fas fa-city ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-city ge-card-icon"></i></div>
            <span class="ge-card-label">ISS</span><span class="ge-card-desc">Imposto sobre serviços</span>
        </div>

        <div class="ge-card" onclick="abrirModalTrb('simples')" style="--card-cor:#8E44AD;--card-cor-bg:rgba(142,68,173,0.10);">
            <i class="fas fa-star ge-card-bg-icon"></i>
            <div class="ge-card-icon-wrap"><i class="fas fa-star ge-card-icon"></i></div>
            <span class="ge-card-label">Simples Nacional</span><span class="ge-card-desc">Regime simplificado</span>
        </div>

    </div>
</div>

<script>
const modaisTrb = {
    icms:      {titulo:'ICMS',            icone:'fas fa-percentage',          campos:[['UF Origem *','uf_orig','text'],['UF Destino *','uf_dest','text'],['Alíquota (%)','aliq','number'],['MVA (%)','mva','number']]},
    ipi:       {titulo:'IPI',             icone:'fas fa-industry',             campos:[['NCM *','ncm','text'],['Descrição','desc','text'],['Alíquota (%)','aliq','number'],['CST','cst','text']]},
    pis_cofins:{titulo:'PIS / COFINS',    icone:'fas fa-file-invoice-dollar',  campos:[['CST *','cst','text'],['Descrição','desc','text'],['Alíq. PIS (%)','pis','number'],['Alíq. COFINS (%)','cofins','number']]},
    iss:       {titulo:'ISS',             icone:'fas fa-city',                 campos:[['Município *','mun','text'],['Serviço *','serv','text'],['Alíquota (%)','aliq','number']]},
    simples:   {titulo:'Simples Nacional',icone:'fas fa-star',                 campos:[['Anexo *','anexo','text'],['Faixa Receita','faixa','text'],['Alíquota Efetiva (%)','aliq','number']]},
};

function abrirModalTrb(tipo) {
    const m = modaisTrb[tipo]; if (!m) return;
    const campos = m.campos.map(([label,name,type]) => `<div class="ge-form-group"><label>${label}</label><input type="${type}" name="${name}" placeholder="${label.replace(' *','')}"></div>`).join('');
    document.getElementById('modal-titulo-trb').textContent = m.titulo;
    document.getElementById('modal-icon-trb').className = m.icone + ' ge-modal-icon';
    document.getElementById('modal-body-trb').innerHTML = `<form class="ge-form" method="POST" action="#">${campos}<div class="ge-form-actions"><button type="button" class="ge-btn-cancelar" onclick="fecharModalTrb()">Cancelar</button><button type="submit" class="ge-btn-salvar">💾 Salvar</button></div></form>`;
    document.getElementById('modal-overlay-trb').classList.add('ativo');
    document.body.style.overflow = 'hidden';
}
function fecharModalTrb() { document.getElementById('modal-overlay-trb').classList.remove('ativo'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key==='Escape') fecharModalTrb(); });
</script>
