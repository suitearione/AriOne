{% extends "base.html" %}

{% block content %}
<style>
    .arione-index-wrapper {
        display: flex; 
        width: 100%; 
        height: calc(100vh - 65px); 
        position: relative; 
        overflow: hidden;
        background-color: #ffffff;
        transition: background-color 0.4s ease;
    }
    .welcome-area {
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        width: 100%; 
        height: 100%; 
        text-align: center;
        z-index: 1; 
        position: absolute;
        left: 0;
        top: 0;
    }
    .welcome-area h1 {
        font-weight: 700; color: #1a1a1a; margin: 0; letter-spacing: -0.5px;
    }
    .welcome-area p {
        font-size: 1.2rem; color: #444; margin-top: 15px; font-weight: 500;
    }
    #arione-clock-display {
        margin-top: 35px; 
        padding: 15px 30px; 
        border-radius: 12px; 
        background-color: #ffffff; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        border: 1px solid #f0f0f0; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        color: #5A2EA6; 
        font-weight: 800; 
        font-size: 1.2rem;
        transition: all 0.4s ease;
    }

    /* HOME DARK MODE OVERRIDES */
    body.dark-mode .arione-index-wrapper {
        background-color: #0f172a !important;
    }
    body.dark-mode .welcome-area h1 {
        color: #f8fafc !important;
    }
    body.dark-mode .welcome-area p {
        color: #94a3b8 !important;
    }
    body.dark-mode #arione-clock-display {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        color: #f1f5f9 !important;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4) !important;
    }
    body.dark-mode .welcome-area img {
        filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.5)) brightness(1.1);
    }
</style>

<div class="arione-index-wrapper">

    <div class="welcome-area">

        <img src="{{ url_for('static', filename='img/arione-logo.png') }}" 
             alt="Logo AriOne" 
             style="max-width: 320px; height: auto; margin-bottom: 25px;">
                    
        <h1>
            Bem-vindo ao {{ sistema_nome }} {{ sistema_versao_num }}<span style="color: #FF5722;">{{ sistema_versao_suffix }}</span>
        </h1>

        <p>
            Único, tudo-em-um.
        </p>

        <span style="color: #999; font-style: italic; margin-top: 10px; font-size: 0.9rem;">
            Escolha uma opção no menu à esquerda para começar.
        </span>

        <div id="arione-clock-display">
            Carregando data...
        </div>
    </div>

    <div class="arione-right-sidebar-container" 
         style="position: absolute; 
                right: 0; 
                top: 0; 
                height: calc(100vh - 65px); 
                width: 110px; 
                z-index: 10;">
                                
        {% include 'partials/_favoritos.html' %}
    </div>

</div>

<script>
    function updateClock() {
        const now = new Date();
        const options = { 
            weekday: 'long', year: 'numeric', month: 'long', 
            day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' 
        };
        const el = document.getElementById('arione-clock-display');
        if (el) el.innerHTML = now.toLocaleDateString('pt-BR', options);
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
{% endblock %}
